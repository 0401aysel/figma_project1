<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact page</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="/components/header/index.css">
    <link rel="stylesheet" href="/components/footer/index.css">
    <link rel="stylesheet" href="/components/contact/index.css">
</head>
<body>
    <div class="container">
        <div id="header"></div>
        <div id="contact">
            <div class="inner-container inner-txt">
                <form class="contact-form">
                    <div>
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name">
                        <p class="errorName"></p>
                    </div>
                    <div>
                        <label for="surname">surname:</label>
                        <input type="text" id="surname" name="surname">
                        <p class="errorSurname"></p>
                    </div>
                    <div>
                        <label for="email">email:</label>
                        <input type="text" id="email" name="email">
                        <p class="errorMail"></p>
                    </div>
                    <button type="submit">Click me</button>
                </form>
            </div>
        </div>
        <div id="footer"></div>
    </div>
    <script type="module" src="/script.js"></script>
    <script src="/components/contact/index.js"></script>
</body>
</html>
